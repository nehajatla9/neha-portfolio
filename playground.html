<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground — Museum Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     BASE / RESET
     ============================================================ */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --ink: #1C1916;
    --ink-soft: #6B6258;
    --ink-ghost: #AFA89F;
    --periwinkle: #8F94FB;
    --periwinkle-dim: rgba(143,148,251,0.16);

    /*
      ── CASLON TYPOGRAPHY ──
      Big Caslon is a macOS/iOS system font (no web-load needed,
      renders natively on Apple devices). Adobe Caslon Pro requires
      a paid Adobe Fonts/Typekit license — there is no free CDN
      version. If you have an Adobe Fonts kit, add its <link> in
      <head> and prepend "adobe-caslon-pro" below.
      Falls back to Georgia elsewhere (closest free serif in spirit).
    */
    --caslon: "Big Caslon", "Adobe Caslon Pro", Georgia, "Times New Roman", serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--cream);
    font-family: var(--sans);
    color: var(--ink);
    cursor: none; /* native cursor hidden — periwinkle dot used instead */
  }

  a { color: inherit; text-decoration: none; }

  /* ============================================================
     NAV
     ============================================================ */
  .nav-container {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 300;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 48px;
    background: rgba(250,247,242,0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 0.5px solid rgba(28,25,22,0.07);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    font-family: var(--caslon);
    font-size: 20px;
    color: var(--ink);
  }

  .nav-links { display: flex; gap: 34px; }

  .nav-links a {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    position: relative;
    transition: color 0.2s;
  }

  .nav-links a.active { color: var(--ink); }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0; right: 0;
    height: 1px;
    background: var(--periwinkle);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
  }

  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after,
  .nav-links a.active::after { transform: scaleX(1); }

  /* ============================================================
     VIEWPORT / CANVAS
     No perspective, no 3D rotation anywhere in this version.
     #viewport just clips; #canvas is the single flat layer that
     both manual drag/inertia AND cursor-parallax shift together —
     they are two contributors added into the SAME translate3d
     value every frame, so they can never fight or stutter against
     each other (there is only ever one transform write per frame).
     ============================================================ */
  #viewport {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    will-change: transform;
    transform: translate3d(0,0,0);
  }

  #canvas::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(circle at 18% 22%, rgba(28,25,22,0.018) 0%, transparent 50%),
      radial-gradient(circle at 82% 74%, rgba(28,25,22,0.018) 0%, transparent 50%);
  }

  /* ============================================================
     ARTWORK FRAME
     Position set once at creation via translate3d (centering +
     scale folded into one string). Never touches top/left/layout
     after that — only the transform string is rewritten.
     ============================================================ */
  .frame {
    position: absolute;
    top: 0;
    left: 0;
    user-select: none;
    -webkit-user-select: none;
  }

  .frame.near-cursor {
    will-change: transform;
  }

  /* Just the image now — no white card/polaroid background */
  .frame-img-wrap {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 4px;
    box-shadow:
      0 2px 3px rgba(28,25,22,0.06),
      0 14px 36px rgba(28,25,22,0.11),
      0 36px 72px rgba(28,25,22,0.07);
  }

  .frame-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    background: linear-gradient(135deg, #e3ded4, #efe9de);
  }

  /* Caption now sits directly on the cream background, below the
     image, with no enclosing box — just text floating under the art */
  .frame-caption {
    padding-top: 12px;
    text-align: left;
  }

  .frame-title {
    font-family: var(--caslon);
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: var(--ink);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .frame-sub {
    font-family: var(--caslon);
    font-style: italic;
    font-size: 12.5px;
    color: var(--ink-ghost);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ============================================================
     CUSTOM PERIWINKLE CURSOR
     ============================================================ */
  #cursor {
    position: fixed;
    top: 0; left: 0;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--periwinkle);
    box-shadow: 0 0 0 6px var(--periwinkle-dim);
    pointer-events: none;
    z-index: 9999;
    will-change: transform;
    transform: translate3d(-7px, -7px, 0);
  }

  #cursor.dragging {
    box-shadow: 0 0 0 10px var(--periwinkle-dim);
  }

  /* ============================================================
     HINT
     ============================================================ */
  #hint {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    z-index: 250;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
    /* Permanent — no opacity transition, never fades on interaction */
  }

  #hint .hint-line {
    width: 26px; height: 1px;
    background: var(--ink-ghost);
    animation: hintPulse 1.8s ease-in-out infinite;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.3; transform: scaleX(1); }
    50%      { opacity: 1;   transform: scaleX(1.5); }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 640px) {
    .nav-container { padding: 18px 22px; }
    .nav-links { gap: 18px; }
    .nav-links a { font-size: 10px; }
  }
</style>
</head>
<body>

  <nav class="nav-container">
    <a href="index.html" class="nav-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" style="margin-right: 12px;">
        <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="1" stroke-dasharray="3 3"/>
        <path d="M11 22V10L21 22V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>neha.</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Work</a>
      <a href="playground.html" class="active">Playground</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div id="viewport">
    <div id="canvas"></div>
  </div>

  <div id="cursor"></div>

  <div id="hint">
    <div class="hint-line"></div>
    <span>Scroll / Drag to Move</span>
    <div class="hint-line"></div>
  </div>

<script>
/* ================================================================
   ╔══════════════════════════════════════════════════════════╗
   ║   ⭐⭐⭐  ARTWORK TEMPLATE — 15 FIXED SLOTS  ⭐⭐⭐           ║
   ║                                                            ║
   ║   Exactly 15 objects below: 5 LANDSCAPE + 10 PORTRAIT.     ║
   ║   This mix is intentional — it's what gives the wall a     ║
   ║   curated, asymmetric museum feel instead of a flat grid.  ║
   ║                                                            ║
   ║   ── HOW TO REPLACE WITH YOUR OWN ART ──                   ║
   ║   1. For each slot, replace imagePath with your file's      ║
   ║      path or URL, e.g. "assets/art/painting-01.jpg"        ║
   ║      (leave it as-is to keep a soft placeholder gradient)  ║
   ║   2. Replace title with your piece's name.                  ║
   ║   3. Replace caption with a short medium/year/note.         ║
   ║   4. Do NOT change `ratio` unless you want to shift the     ║
   ║      5-landscape / 10-portrait balance — ratio controls     ║
   ║      each frame's shape (landscape = wide, portrait = tall).║
   ║   5. You can add MORE than 15 slots if you want a larger    ║
   ║      rotation — the wall tiles whatever length this array   ║
   ║      is, infinitely, in every direction.                   ║
   ╚══════════════════════════════════════════════════════════╝
   ================================================================ */
  const ARTWORK_DATA = [

    /* ── LANDSCAPE SLOTS (5 total) ───────────────────────────── */
    { imagePath: "assets/art/your-artwork-01.jpg", title: "Artwork Title 01", caption: "Medium, Year", ratio: "landscape" },
    { imagePath: "assets/art/your-artwork-02.jpg", title: "Artwork Title 02", caption: "Medium, Year", ratio: "landscape" },
    { imagePath: "assets/art/your-artwork-03.jpg", title: "Artwork Title 03", caption: "Medium, Year", ratio: "landscape" },
    { imagePath: "assets/art/your-artwork-04.jpg", title: "Artwork Title 04", caption: "Medium, Year", ratio: "landscape" },
    { imagePath: "assets/art/your-artwork-05.jpg", title: "Artwork Title 05", caption: "Medium, Year", ratio: "landscape" },

    /* ── PORTRAIT SLOTS (10 total) ───────────────────────────── */
    { imagePath: "assets/art/1-watercolor-girl.jpg", title: "Watercolor Ink Portrait", caption: "2020", ratio: "portrait" },
    { imagePath: "assets/art/2-fish.jpg", title: "Acrylic Fish Leap", caption: "2020", ratio: "portrait" },
    { imagePath: "assets/art/3-oilpastel-girl.png", title: "Oil Pastel Portrait", caption: "2021", ratio: "portrait" },
    { imagePath: "assets/art/4-lilly-pads.jpg", title: "Gouache Lilly pads", caption: "2022", ratio: "portrait" },
    { imagePath: "assets/art/5-purple-woman.jpg", title: "Purple Shawl", caption: "2020", ratio: "portrait" },
    { imagePath: "assets/art/6-BW-woman.jpg", title: "Penil Sketch Black and White", caption: "2021", ratio: "portrait" },
    { imagePath: "assets/art/7-flowers.jpg", title: "Artwork Title 12", caption: "Medium, Year", ratio: "portrait" },
    { imagePath: "assets/art/your-artwork-13.jpg", title: "Artwork Title 13", caption: "Medium, Year", ratio: "portrait" },
    { imagePath: "assets/art/your-artwork-14.jpg", title: "Artwork Title 14", caption: "Medium, Year", ratio: "portrait" },
    { imagePath: "assets/art/your-artwork-15.jpg", title: "Artwork Title 15", caption: "Medium, Year", ratio: "portrait" }

  ];
  /* ============== END OF EDITABLE TEMPLATE SECTION ============== */


  /* ================================================================
     CONFIG — layout & feel tuning. Safe to adjust.
     ================================================================ */
  const CONFIG = {
    /* Spacing — cellWidth/cellHeight define the base grid each
       frame's anchor sits on before clustering/jitter is applied. */
    cellWidth: 520,
    cellHeight: 580,

    frameBaseSize: 300,
    jitterScale: 0.2,       // size variance only
    bufferCells: 1,

    captionHeight: 46,      // px reserved below each image for title+caption text

    /* ── OVERLAP — STRICT, NO EXCEPTIONS ──
       Positive px gap guaranteed between any two frames' bounding
       boxes, even at max hover scale. Frames will never touch. */
    safeMargin: 26,

    /* ── CLUSTERING (proximity, not collapse) ──
       Some cells get pulled CLOSER to their cluster neighbors —
       i.e. their jitter range is biased toward the shared cluster
       edge — rather than snapped toward a single shared point.
       This creates visible "this group is tighter than that group"
       structure while every frame still keeps its full safeMargin
       gap from its neighbors — nothing ever overlaps.
       clusterChance: probability a cell biases toward its cluster.
       clusterBias: 0 = no bias (pure even jitter), 1 = jitter fully
         pulled toward the cluster-facing edge of its safe range.
         Keep this moderate (0.3-0.45) — it nudges density, it does
         NOT collapse positions together. */
    clusterChance: 0.5,
    clusterBias: 0.55,

    /* ── GAP CELLS ──
       skipChance: probability a cell is left empty, creating loose
       open space between denser clusters. */
    skipChance: 0.22,

    /* Drag inertia */
    friction: 0.945,
    minVelocity: 0.03,

    /* Scroll-to-pan (trackpad / mouse wheel) */
    scrollSensitivity: 1,

    /* Proximity scaling */
    proximityRadius: 420,
    maxScale: 1.16,
    minScale: 0.95,
    smoothing: 0.08,

    /* Unified cursor parallax */
    maxShift: 70,
    shiftSmoothing: 0.06
  };

  /* ================================================================
     DETERMINISTIC PSEUDO-RANDOM (stable layout, no per-frame Math.random)
     ================================================================ */
  function seededRandom(x, y, salt) {
    const s = Math.sin(x * 127.1 + y * 311.7 + salt * 74.7) * 43758.5453;
    return s - Math.floor(s);
  }

  /* ================================================================
     STATE
     ================================================================ */
  const canvas = document.getElementById('canvas');
  const cursorEl = document.getElementById('cursor');
  const hint = document.getElementById('hint');

  // originX/Y = the manual drag/inertia pan offset
  let originX = 0, originY = 0;
  let velX = 0, velY = 0;
  let isDragging = false;
  let lastX = 0, lastY = 0;
  let lastMoveTime = 0;
  let inertiaActive = false;

  // parallaxX/Y = the secondary cursor-driven shift, eased toward target.
  // Final canvas transform each frame = (originX + parallaxX, originY + parallaxY)
  // — a single addition, never a separate transform layer, so it can
  // never desync or stutter against the drag.
  let parallaxX = 0, parallaxY = 0;
  let targetParallaxX = 0, targetParallaxY = 0;

  let cursorScreenX = window.innerWidth / 2;
  let cursorScreenY = window.innerHeight / 2;

  // Key = "cellX,cellY" -> { el, scale, cx, cy, w, h, isNear }
  const renderedCells = new Map();

  /* ================================================================
     ASPECT RATIO → WIDTH/HEIGHT
     Returns the IMAGE's dimensions only. The frame's total height
     (used for centering) adds CONFIG.captionHeight on top, since
     the caption now lives below the image as plain text, not
     inside a shared card.
     ================================================================ */
  function getFrameDims(ratio, scaleVariance) {
    const base = CONFIG.frameBaseSize * (1 + scaleVariance);
    switch (ratio) {
      // True 4:3 portrait (height:width = 4:3 = 1.333)
      case 'portrait':  return { w: base * 0.86, h: base * 1.1467 };
      case 'landscape': return { w: base * 1.28, h: base * 0.84 };
      case 'square':
      default:          return { w: base, h: base };
    }
  }

  /* ================================================================
     CREATE A FRAME for a given infinite grid cell.
     Cell coords map to ARTWORK_DATA (15 slots) via hashed modulo —
     pattern stays stable across re-renders and never repeats in an
     obvious tile.

     ── NO-OVERLAP GUARANTEE (strict) ──
     Jitter is capped to half the leftover space in the cell after
     the frame's own size AT MAX HOVER SCALE plus safeMargin are
     subtracted. This is the full available range — clusterBias
     below only shifts WHERE within that already-safe range a frame
     lands; it never extends the range itself. So frames can lean
     closer to their neighbors, but can never overlap them.

     ── CLUSTERING (proximity bias, not collapse) ──
     A cell that "joins a cluster" gets its jitter biased toward
     whichever direction points at the nearest shared cluster
     center, rather than having its full jitter range collapsed
     toward that center. The frame still uses its complete safe
     jitter budget — it's just no longer centered at zero bias,
     so clustered groups read as visibly tighter while non-clustered
     gaps read as looser, with the no-overlap guarantee untouched.
     ================================================================ */
  function createFrame(cellX, cellY) {
    const dataLen = ARTWORK_DATA.length;
    const hash = Math.abs((cellX * 928371 + cellY * 73291) % dataLen);
    const art = ARTWORK_DATA[hash];

    const rx = seededRandom(cellX, cellY, 1);
    const ry = seededRandom(cellX, cellY, 2);
    const rs = seededRandom(cellX, cellY, 3);
    const rc = seededRandom(cellX, cellY, 4); // decides cluster membership

    const scaleVariance = (rs - 0.5) * 2 * CONFIG.jitterScale;

    const { w: imgW, h: imgH } = getFrameDims(art.ratio, scaleVariance);
    const totalH = imgH + CONFIG.captionHeight;

    const scaledW = imgW * CONFIG.maxScale;
    const scaledH = totalH * CONFIG.maxScale;
    const maxJitterX = Math.max(0, (CONFIG.cellWidth  - scaledW - CONFIG.safeMargin) / 2);
    const maxJitterY = Math.max(0, (CONFIG.cellHeight - scaledH - CONFIG.safeMargin) / 2);

    // Base jitter: -1..1 random, scaled to the safe range.
    let jitterFracX = (rx - 0.5) * 2;
    let jitterFracY = (ry - 0.5) * 2;

    // ── Cluster bias ──
    // Pick a stable "lean direction" for this cell (toward one of
    // its 4 neighbors, chosen deterministically) and nudge the
    // -1..1 fraction toward that direction. Still clamped to -1..1,
    // so it can NEVER exceed the already-safe jitter range.
    if (rc < CONFIG.clusterChance) {
      const leanRoll = seededRandom(cellX, cellY, 5);
      const leanX = leanRoll < 0.5 ? -1 : 1;
      const leanY = seededRandom(cellX, cellY, 6) < 0.5 ? -1 : 1;

      jitterFracX = Math.max(-1, Math.min(1, jitterFracX + leanX * CONFIG.clusterBias));
      jitterFracY = Math.max(-1, Math.min(1, jitterFracY + leanY * CONFIG.clusterBias));
    }

    const jitterX = jitterFracX * maxJitterX;
    const jitterY = jitterFracY * maxJitterY;

    const baseX = cellX * CONFIG.cellWidth + jitterX;
    const baseY = cellY * CONFIG.cellHeight + jitterY;

    const el = document.createElement('div');
    el.className = 'frame';
    el.style.width = imgW + 'px';
    el.style.height = totalH + 'px';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'frame-img-wrap';
    imgWrap.style.height = imgH + 'px';

    const img = document.createElement('img');
    img.className = 'frame-img';
    img.draggable = false;
    img.loading = 'lazy';
    img.alt = art.title;
    if (art.imagePath) {
      img.src = art.imagePath;
      img.onerror = () => { img.style.opacity = '0'; };
    }
    imgWrap.appendChild(img);

    const caption = document.createElement('div');
    caption.className = 'frame-caption';
    caption.innerHTML =
      '<div class="frame-title">' + art.title + '</div>' +
      '<div class="frame-sub">' + art.caption + '</div>';

    el.appendChild(imgWrap);
    el.appendChild(caption);

    const frame = { el, cx: baseX, cy: baseY, w: imgW, h: totalH, scale: CONFIG.minScale, isNear: false };
    writeFrameTransform(frame);
    return frame;
  }

  /* ================================================================
     WRITE A FRAME'S TRANSFORM — translate3d (center) + scale,
     combined into one string. Only this and the near-cursor class
     toggle are ever written per frame; no layout properties touched.
     ================================================================ */
  function writeFrameTransform(frame) {
    const tx = frame.cx - frame.w / 2;
    const ty = frame.cy - frame.h / 2;
    frame.el.style.transform =
      'translate3d(' + tx.toFixed(1) + 'px, ' + ty.toFixed(1) + 'px, 0) scale(' + frame.scale.toFixed(4) + ')';
  }

  /* ================================================================
     RENDER VISIBLE CELLS
     Mounts/unmounts frames based on the combined pan+parallax
     offset, so the wall stays infinite without unbounded DOM growth.
     ================================================================ */
  function renderVisibleCells() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const totalX = originX + parallaxX;
    const totalY = originY + parallaxY;

    const left   = -totalX;
    const top    = -totalY;
    const right  = left + vw;
    const bottom = top + vh;

    const minCellX = Math.floor(left   / CONFIG.cellWidth)  - CONFIG.bufferCells;
    const maxCellX = Math.ceil (right  / CONFIG.cellWidth)  + CONFIG.bufferCells;
    const minCellY = Math.floor(top    / CONFIG.cellHeight) - CONFIG.bufferCells;
    const maxCellY = Math.ceil (bottom / CONFIG.cellHeight) + CONFIG.bufferCells;

    const neededKeys = new Set();

    for (let cy = minCellY; cy <= maxCellY; cy++) {
      for (let cx = minCellX; cx <= maxCellX; cx++) {
        const key = cx + ',' + cy;

        // ── Skip some cells entirely ──
        // Creates genuine empty gaps between clusters rather than
        // every grid point always holding a frame. Deterministic
        // per-cell (same seededRandom approach as jitter) so the
        // pattern of gaps stays stable across re-renders.
        const skipRoll = seededRandom(cx, cy, 9);
        if (skipRoll < CONFIG.skipChance) {
          continue; // leave this cell empty — don't add to neededKeys
        }

        neededKeys.add(key);
        if (!renderedCells.has(key)) {
          const frame = createFrame(cx, cy);
          canvas.appendChild(frame.el);
          renderedCells.set(key, frame);
        }
      }
    }

    for (const [key, frame] of renderedCells) {
      if (!neededKeys.has(key)) {
        frame.el.remove();
        renderedCells.delete(key);
      }
    }
  }

  /* ================================================================
     APPLY CANVAS TRANSFORM
     The ONE place where pan (drag/inertia) and parallax (cursor
     shift) are combined — simple addition, single translate3d
     write. This is what guarantees they never desync: there is
     only ever one transform on one element, built from two summed
     numbers.
     ================================================================ */
  function applyCanvasTransform() {
    const totalX = originX + parallaxX;
    const totalY = originY + parallaxY;
    canvas.style.transform = 'translate3d(' + totalX.toFixed(1) + 'px, ' + totalY.toFixed(1) + 'px, 0)';
  }

  /* ================================================================
     ⭐ UNIFIED CURSOR PARALLAX (replaces 3D tilt entirely) ⭐
     No rotation, no skew, no perspective — just a bounded flat
     offset applied to the whole canvas, same direction as the
     cursor's offset from screen-center. Eased with a lerp so it
     glides rather than snapping.
     ================================================================ */
  function updateParallaxTarget() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Normalize cursor position to -1..1 relative to screen center
    const nx = (cursorScreenX / vw) * 2 - 1;
    const ny = (cursorScreenY / vh) * 2 - 1;

    // Whole canvas shifts in the SAME direction the cursor moves
    // (cursor goes up -> ny negative -> canvas shifts up, etc.)
    targetParallaxX = nx * CONFIG.maxShift;
    targetParallaxY = ny * CONFIG.maxShift;
  }

  function easeParallax() {
    parallaxX += (targetParallaxX - parallaxX) * CONFIG.shiftSmoothing;
    parallaxY += (targetParallaxY - parallaxY) * CONFIG.shiftSmoothing;
  }

  /* ================================================================
     PROXIMITY SCALING — cost scales with rendered frame count only
     ================================================================ */
  function updateProximityScaling() {
    const totalX = originX + parallaxX;
    const totalY = originY + parallaxY;

    for (const frame of renderedCells.values()) {
      const screenX = frame.cx + totalX;
      const screenY = frame.cy + totalY;

      const dx = screenX - cursorScreenX;
      const dy = screenY - cursorScreenY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      const t = Math.min(dist / CONFIG.proximityRadius, 1);
      const targetScale = CONFIG.maxScale + (CONFIG.minScale - CONFIG.maxScale) * t;

      frame.scale += (targetScale - frame.scale) * CONFIG.smoothing;

      const shouldBeNear = t < 0.85;
      if (shouldBeNear !== frame.isNear) {
        frame.isNear = shouldBeNear;
        frame.el.classList.toggle('near-cursor', shouldBeNear);
      }

      writeFrameTransform(frame);
    }
  }

  /* ================================================================
     UNIFIED MAIN LOOP
     One rAF call drives parallax easing, proximity scaling, and
     (when active) inertia — all three read/write the same shared
     originX/Y + parallaxX/Y state, then make exactly one canvas
     transform write per frame via applyCanvasTransform().
     ================================================================ */
  function mainLoop() {
    easeParallax();

    if (inertiaActive) {
      originX += velX;
      originY += velY;
      velX *= CONFIG.friction;
      velY *= CONFIG.friction;

      if (Math.abs(velX) < CONFIG.minVelocity && Math.abs(velY) < CONFIG.minVelocity) {
        inertiaActive = false;
      }
    }

    applyCanvasTransform();
    updateProximityScaling();

    // Re-render visible cells continuously while either inertia or
    // parallax is actively moving the canvas (cheap check; renderVisibleCells
    // itself is a no-op when nothing new has entered view).
    renderVisibleCells();

    requestAnimationFrame(mainLoop);
  }

  /* ================================================================
     POINTER EVENTS (mouse + touch unified)
     ================================================================ */
  function onPointerDown(e) {
    isDragging = true;
    inertiaActive = false;
    lastX = e.clientX;
    lastY = e.clientY;
    lastMoveTime = performance.now();
    velX = 0; velY = 0;
    cursorEl.classList.add('dragging');
  }

  function onPointerMove(e) {
    cursorScreenX = e.clientX;
    cursorScreenY = e.clientY;
    cursorEl.style.transform = 'translate3d(' + (e.clientX - 7) + 'px, ' + (e.clientY - 7) + 'px, 0)';
    updateParallaxTarget();

    if (!isDragging) return;

    const now = performance.now();
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    const dt = Math.max(now - lastMoveTime, 1);

    originX += dx;
    originY += dy;

    velX = (dx / dt) * 16;
    velY = (dy / dt) * 16;

    lastX = e.clientX;
    lastY = e.clientY;
    lastMoveTime = now;

    // No direct transform write here — mainLoop's applyCanvasTransform
    // picks up the new originX/Y on the very next frame, keeping drag
    // and parallax on the exact same single-write cadence.
  }

  function onPointerUp() {
    if (!isDragging) return;
    isDragging = false;
    cursorEl.classList.remove('dragging');

    if (Math.abs(velX) > CONFIG.minVelocity || Math.abs(velY) > CONFIG.minVelocity) {
      inertiaActive = true;
    }
  }

  window.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove, { passive: true });
  window.addEventListener('pointerup', onPointerUp, { passive: true });
  window.addEventListener('pointercancel', onPointerUp, { passive: true });
  window.addEventListener('pointerleave', onPointerUp, { passive: true });
  window.addEventListener('dragstart', e => e.preventDefault());

  /* ================================================================
     SCROLL / TRACKPAD TO PAN
     Mouse wheel or trackpad scroll moves the wall the same way a
     drag does — feeds directly into originX/Y, the same state drag
     and inertia use, so it composites through the exact same single
     transform write in applyCanvasTransform() with zero extra logic.
     Trackpad two-finger swipes naturally produce both deltaX and
     deltaY, giving free multi-directional panning; a plain vertical
     mouse wheel pans on the Y axis only, which feels natural too.
     preventDefault stops the page itself from scrolling.
     ================================================================ */
  function onWheel(e) {
    e.preventDefault();
    inertiaActive = false; // a fresh scroll input overrides any glide in progress
    velX = 0; velY = 0;

    originX -= e.deltaX * CONFIG.scrollSensitivity;
    originY -= e.deltaY * CONFIG.scrollSensitivity;
  }

  window.addEventListener('wheel', onWheel, { passive: false });

  /* ================================================================
     RESIZE (debounced)
     ================================================================ */
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(renderVisibleCells, 120);
  }, { passive: true });

  /* ================================================================
     INIT
     ================================================================ */
  function init() {
    originX = -CONFIG.cellWidth * 1.2;
    originY = -CONFIG.cellHeight * 1.2;
    renderVisibleCells();
    mainLoop(); // single unified loop: parallax + scaling + inertia + render
  }

  init();
</script>
</body>
</html>
