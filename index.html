<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neha — Portfolio</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Three.js r134 (stable CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<!-- GSAP + ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: auto; }

  body {
    background: #F4F7FF;
    font-family: 'Inter', system-ui, sans-serif;
    overflow-x: hidden;
    color: #1a1a2e;
  }

  /* ── Fixed canvas ──────────────────────────── */
  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  #canvas-container canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ── Scrollable content layer ───────────────── */
  #content {
    position: relative;
    z-index: 2;
    pointer-events: none;
  }

  /* ── Spacer that gives room for scroll journey ─ */
  #scroll-spacer {
    height: 400vh;
  }

  /* ── Intro reveal section ────────────────────── */
  #intro-section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #intro-card {
    text-align: center;
    opacity: 0;
    transform: translateY(28px);
    will-change: opacity, transform;
  }

  #intro-card h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(3.5rem, 9vw, 7.5rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(130deg, #6B21A8 0%, #A855F7 45%, #EC4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #intro-card p {
    margin-top: 1.2rem;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.45rem);
    font-weight: 300;
    color: #7c6a9a;
    letter-spacing: 0.05em;
  }

  /* ── Scroll hint ─────────────────────────────── */
  #scroll-hint {
    position: fixed;
    bottom: 2.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.45rem;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  #scroll-hint span {
    font-size: 0.62rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #9b8bbb;
  }

  #scroll-hint .bar {
    width: 1px;
    height: 38px;
    background: linear-gradient(to bottom, transparent, #a78cc8);
    animation: barPulse 1.7s ease-in-out infinite;
  }

  @keyframes barPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
    50%       { opacity: 1;   transform: scaleY(1);   }
  }

  /* ── Lotus nav labels ──────────────────────────── */
  .lotus-label {
    position: fixed;
    z-index: 20;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(168,85,247,0.18);
    border-radius: 20px;
    padding: 0.3rem 0.85rem;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6B21A8;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s;
    white-space: nowrap;
    transform: translate(-50%, calc(-100% - 10px));
  }

  @media (prefers-reduced-motion: reduce) {
    .bar { animation: none !important; }
    #intro-card { transition: none !important; }
  }
</style>
</head>
<body>

<!-- ── 3D canvas layer ───────────────────────────────────────── -->
<div id="canvas-container"></div>

<!-- ── Hover labels for small lotuses ───────────────────────── -->
<div class="lotus-label" id="label-0"></div>
<div class="lotus-label" id="label-1"></div>
<div class="lotus-label" id="label-2"></div>
<div class="lotus-label" id="label-3"></div>
<div class="lotus-label" id="label-4"></div>

<!-- ── Scrollable content ────────────────────────────────────── -->
<div id="content">
  <div id="scroll-spacer"></div>

  <section id="intro-section">
    <div id="intro-card">
      <h1>Hi, I'm Neha.</h1>
      <p>Software engineer &nbsp;·&nbsp; artist &nbsp;·&nbsp; designer</p>
    </div>
  </section>
</div>

<!-- ── Scroll cue ────────────────────────────────────────────── -->
<div id="scroll-hint">
  <span>Scroll</span>
  <div class="bar"></div>
</div>

<!-- ================================================================
     THREE.JS + GSAP SCRIPT
     ================================================================ -->
<script>
(function () {
  'use strict';

  /* ──────────────────────────────────────────
     RENDERER
  ────────────────────────────────────────── */
  const container = document.getElementById('canvas-container');

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  /* ──────────────────────────────────────────
     SCENE + CAMERA
  ────────────────────────────────────────── */
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xF0F5FF);
  scene.fog = new THREE.FogExp2(0xE8F0FF, 0.025);

  const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 300);
  camera.position.set(0, 8, 14);
  camera.lookAt(0, 0, 0);

  /* ──────────────────────────────────────────
     LIGHTS
  ────────────────────────────────────────── */
  scene.add(new THREE.AmbientLight(0xffffff, 0.75));

  const sun = new THREE.DirectionalLight(0xfff0ff, 2.2);
  sun.position.set(6, 20, 8);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  scene.add(sun);

  const purplePoint = new THREE.PointLight(0xA855F7, 2.0, 30);
  purplePoint.position.set(-3, 7, 3);
  scene.add(purplePoint);

  const pinkPoint = new THREE.PointLight(0xEC4899, 1.4, 22);
  pinkPoint.position.set(4, 5, -5);
  scene.add(pinkPoint);

  /* ──────────────────────────────────────────
     WATER PLANE — vertex shader ripples
  ────────────────────────────────────────── */
  const MAX_RIPPLES = 8;
  const rippleStore = [];
  let gTime = 0;

  const wUniforms = {
    uTime:        { value: 0 },
    uRippleCount: { value: 0 },
    uRipplePos:   { value: Array.from({length: MAX_RIPPLES}, () => new THREE.Vector2()) },
    uRippleTime:  { value: new Float32Array(MAX_RIPPLES) },
    uRippleStr:   { value: new Float32Array(MAX_RIPPLES) },
    uColor1:      { value: new THREE.Color(0xBDD7FF) },
    uColor2:      { value: new THREE.Color(0xEEF4FF) },
    uFogColor:    { value: new THREE.Color(0xE8F0FF) },
  };

  const waterVS = /* glsl */`
    uniform float uTime;
    uniform int   uRippleCount;
    uniform vec2  uRipplePos[8];
    uniform float uRippleTime[8];
    uniform float uRippleStr[8];
    varying vec2  vUv;
    varying float vH;
    void main(){
      vUv = uv;
      vec3 p = position;
      p.y += sin(p.x * 0.35 + uTime * 0.55) * 0.07
           + sin(p.z * 0.28 + uTime * 0.48) * 0.07;
      for(int i=0;i<8;i++){
        if(i>=uRippleCount) break;
        float age  = uTime - uRippleTime[i];
        float d    = distance(p.xz, uRipplePos[i]);
        float w    = sin(d*3.0 - age*7.0) * exp(-d*0.45) * exp(-age*0.85);
        p.y += w * uRippleStr[i];
      }
      vH = p.y;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `;

  const waterFS = /* glsl */`
    uniform vec3  uColor1;
    uniform vec3  uColor2;
    uniform vec3  uFogColor;
    varying vec2  vUv;
    varying float vH;
    void main(){
      float r   = length(vUv - 0.5) * 2.0;
      vec3  col = mix(uColor1, uColor2, r);
      col += vH * 0.35;
      col = mix(col, uFogColor, r * r * 0.5);
      float a = clamp(1.0 - r * 0.9, 0.0, 1.0) * 0.52;
      gl_FragColor = vec4(col, a);
    }
  `;

  const waterMat = new THREE.ShaderMaterial({
    vertexShader: waterVS, fragmentShader: waterFS,
    uniforms: wUniforms, transparent: true, depthWrite: false, side: THREE.DoubleSide,
  });
  const waterGeo = new THREE.PlaneGeometry(70, 70, 140, 140);
  waterGeo.rotateX(-Math.PI / 2);
  const waterMesh = new THREE.Mesh(waterGeo, waterMat);
  waterMesh.position.y = -0.06;
  waterMesh.receiveShadow = true;
  scene.add(waterMesh);

  function addRipple(x, z, str) {
    if (rippleStore.length >= MAX_RIPPLES) rippleStore.shift();
    rippleStore.push({ x, z, t: gTime, str });
    rippleStore.forEach((r, i) => {
      wUniforms.uRipplePos.value[i].set(r.x, r.z);
      wUniforms.uRippleTime.value[i] = r.t;
      wUniforms.uRippleStr.value[i]  = r.str;
    });
    wUniforms.uRippleCount.value = rippleStore.length;
  }

  /* ──────────────────────────────────────────
     PETAL SHAPE HELPER
  ────────────────────────────────────────── */
  function makePetalShape(len, wid) {
    const s = new THREE.Shape();
    s.moveTo(0, 0);
    s.bezierCurveTo(-wid, len * 0.3, -wid * 0.4, len * 0.78, 0, len);
    s.bezierCurveTo( wid * 0.4, len * 0.78,  wid, len * 0.3, 0, 0);
    return s;
  }

  /* ──────────────────────────────────────────
     MAIN LOTUS — 5 petal layers, glass look
  ────────────────────────────────────────── */
  const lotusGroup = new THREE.Group();
  scene.add(lotusGroup);

  /*
    Each layer: { count, r, len, wid, startAngle, budX, openX, yOff }
    budX  = rotationX in closed bud state (petals folded upward)
    openX = rotationX in fully-bloomed state (petals splayed open)
  */
  const layers = [
    { count: 6,  r: 0.00, len: 0.85, wid: 0.26, sa: 0,              yOff: 0.00, budX: 1.50, openX: -0.28 },
    { count: 7,  r: 0.22, len: 1.00, wid: 0.30, sa: Math.PI / 7,    yOff: 0.04, budX: 1.38, openX: -0.40 },
    { count: 8,  r: 0.40, len: 1.15, wid: 0.34, sa: 0,              yOff: 0.02, budX: 1.22, openX: -0.52 },
    { count: 9,  r: 0.60, len: 1.30, wid: 0.38, sa: Math.PI / 9,    yOff: 0.01, budX: 1.05, openX: -0.63 },
    { count: 10, r: 0.80, len: 1.48, wid: 0.43, sa: 0,              yOff: 0.00, budX: 0.88, openX: -0.74 },
  ];

  const petalLayers = [];  /* stores { petals: Mesh[], budX, openX } */

  const extrudeOpts = {
    depth: 0.04, bevelEnabled: true,
    bevelThickness: 0.012, bevelSize: 0.012, bevelSegments: 3
  };

  layers.forEach((cfg, li) => {
    const t      = li / (layers.length - 1);
    const shape  = makePetalShape(cfg.len, cfg.wid);
    const geo    = new THREE.ExtrudeGeometry(shape, extrudeOpts);
    geo.translate(0, 0, -0.02);

    const mat = new THREE.MeshPhysicalMaterial({
      color:             new THREE.Color().lerpColors(new THREE.Color(0x6B21A8), new THREE.Color(0xDB2777), t * 0.75),
      emissive:          new THREE.Color().lerpColors(new THREE.Color(0x3B0764), new THREE.Color(0x9D174D), t * 0.55),
      emissiveIntensity: 0.22,
      metalness:         0.0,
      roughness:         0.06,
      transmission:      0.62,
      thickness:         0.38,
      ior:               1.55,
      transparent:       true,
      opacity:           0.90,
      side:              THREE.DoubleSide,
    });

    const layerData = { petals: [], budX: cfg.budX, openX: cfg.openX };

    for (let i = 0; i < cfg.count; i++) {
      const angle = (i / cfg.count) * Math.PI * 2 + cfg.sa;
      const mesh  = new THREE.Mesh(geo, mat);
      mesh.position.set(
        Math.sin(angle) * cfg.r,
        cfg.yOff,
        Math.cos(angle) * cfg.r
      );
      mesh.rotation.y = -angle;
      mesh.rotation.x =  cfg.budX;   /* start closed */
      mesh.castShadow  = true;
      lotusGroup.add(mesh);
      layerData.petals.push(mesh);
    }
    petalLayers.push(layerData);
  });

  /* Stamen (centre knob) */
  const stamenMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.20, 16, 16),
    new THREE.MeshPhysicalMaterial({ color: 0xFDE68A, emissive: 0xF59E0B, emissiveIntensity: 0.45, roughness: 0.3, metalness: 0.1 })
  );
  stamenMesh.position.y = 0.06;
  lotusGroup.add(stamenMesh);

  /* Stem */
  lotusGroup.add(Object.assign(
    new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.09, 1.5, 12),
      new THREE.MeshLambertMaterial({ color: 0x3D7A55 })
    ),
    { position: new THREE.Vector3(0, -0.76, 0) }
  ));

  /* Lily pad */
  const padShape = new THREE.Shape();
  for (let i = 0; i <= 48; i++) {
    const a = (i / 48) * Math.PI * 2;
    const j = 1 + Math.sin(i * 2.5) * 0.07;
    if (i === 0) padShape.moveTo(Math.cos(a) * 1.7 * j, Math.sin(a) * 1.7 * j);
    else         padShape.lineTo(Math.cos(a) * 1.7 * j, Math.sin(a) * 1.7 * j);
  }
  const padGeo = new THREE.ShapeGeometry(padShape);
  padGeo.rotateX(-Math.PI / 2);
  lotusGroup.add(Object.assign(
    new THREE.Mesh(padGeo, new THREE.MeshLambertMaterial({ color: 0x2D6A4F, transparent: true, opacity: 0.80, side: THREE.DoubleSide })),
    { position: new THREE.Vector3(0, 0.01, 0) }
  ));

  /* ──────────────────────────────────────────
     SMALL SURROUNDING LOTUSES
  ────────────────────────────────────────── */
  const smallData = [
  { x: -4.8, z: -3.2, s: 0.46, color: 0xDDD6FE, label: 'Work',       href: 'work.html'       },
  { x:  4.2, z: -3.8, s: 0.41, color: 0xFCE7F3, label: 'Art',        href: 'playground.html' },
  { x: -3.8, z:  4.2, s: 0.44, color: 0xEDE9FE, label: 'About',      href: 'about.html'      },
  { x:  5.2, z:  2.8, s: 0.39, color: 0xFDF2F8, label: 'Contact',    href: 'about.html'      },
  { x:  0.8, z:  5.8, s: 0.37, color: 0xE0E7FF, label: 'Playground', href: 'playground.html' },
];

  const smallLotuses = [];
  const labels = document.querySelectorAll('.lotus-label');

  smallData.forEach((d, idx) => {
    const grp = new THREE.Group();
    grp.position.set(d.x, 0.02, d.z);
    grp.scale.setScalar(d.s);
    grp.userData = { href: d.href, idx };

    const mat = new THREE.MeshPhysicalMaterial({
      color: d.color, roughness: 0.18, metalness: 0,
      transparent: true, opacity: 0.72, side: THREE.DoubleSide,
    });

    [[4, 0,    0.7, 0.22, 1.10],
     [5, 0.18, 0.8, 0.25, 0.85],
     [6, 0.35, 0.9, 0.28, 0.58]].forEach(([count, r, len, wid, rx]) => {
      const g = new THREE.ShapeGeometry(makePetalShape(len, wid));
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        const m = new THREE.Mesh(g, mat);
        m.position.set(Math.sin(a) * r, 0, Math.cos(a) * r);
        m.rotation.set(rx, -a, 0);
        grp.add(m);
      }
    });

    /* small pad */
    const sg = new THREE.CircleGeometry(1.1, 18);
    sg.rotateX(-Math.PI / 2);
    grp.add(new THREE.Mesh(sg, new THREE.MeshLambertMaterial({ color: 0x3A8060, transparent: true, opacity: 0.68 })));

    scene.add(grp);
    smallLotuses.push(grp);
    if (labels[idx]) labels[idx].textContent = d.label;
  });

  /* ──────────────────────────────────────────
     MOUSE INTERACTION
  ────────────────────────────────────────── */
  const ray = new THREE.Raycaster();
  const nd  = new THREE.Vector2();
  let hovered = null;

  function setND(e) {
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    nd.set((cx / window.innerWidth) * 2 - 1, -(cy / window.innerHeight) * 2 + 1);
  }

  window.addEventListener('mousemove', e => {
    setND(e);

    /* Water ripples on move (sparse) */
    ray.setFromCamera(nd, camera);
    const wh = ray.intersectObject(waterMesh);
    if (wh.length && Math.random() < 0.07) addRipple(wh[0].point.x, wh[0].point.z, 0.16);

    /* Small lotus hover */
    ray.setFromCamera(nd, camera);
    const hits = ray.intersectObjects(smallLotuses, true);
    if (hits.length) {
      const top = hits[0].object.parent;
      if (top !== hovered) hovered = top;
      const i   = top.userData.idx;
      const lbl = labels[i];
      if (lbl) {
        const v = top.position.clone().project(camera);
        lbl.style.left    = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
        lbl.style.top     = `${(-v.y * 0.5 + 0.5) * window.innerHeight}px`;
        lbl.style.opacity = '1';
      }
      document.body.style.cursor = 'pointer';
    } else {
      if (hovered) { labels.forEach(l => l.style.opacity = '0'); hovered = null; }
      document.body.style.cursor = 'default';
    }
  });

  window.addEventListener('click', e => {
    setND(e);
    ray.setFromCamera(nd, camera);
    const wh = ray.intersectObject(waterMesh);
    if (wh.length) addRipple(wh[0].point.x, wh[0].point.z, 0.75);

    ray.setFromCamera(nd, camera);
    const hits = ray.intersectObjects(smallLotuses, true);
    if (hits.length) {
      const d = smallData[hits[0].object.parent.userData.idx];
      if (d) window.location.href = d.href;
    }
  });

  /* ──────────────────────────────────────────
     GSAP SCROLL TIMELINE
  ────────────────────────────────────────── */
  gsap.registerPlugin(ScrollTrigger);

  /* Camera is driven by a proxy object so GSAP can tween it cleanly */
  const camProxy = { x: 0, y: 8, z: 14 };
  const lookTarget = new THREE.Vector3(0, 0, 0);

  const scrollHintEl = document.getElementById('scroll-hint');

  const tl = gsap.timeline({
    scrollTrigger: {
      trigger:  '#scroll-spacer',
      start:    'top top',
      end:      'bottom bottom',
      scrub:    1.8,
      onUpdate: self => {
        /* Hide scroll hint after first movement */
        if (scrollHintEl) scrollHintEl.style.opacity = self.progress > 0.015 ? '0' : '1';
      }
    }
  });

  /* 1 — BLOOM: open each petal layer in stagger */
  petalLayers.forEach((layer, li) => {
    const startAt = li * 0.045;          /* stagger by layer */
    layer.petals.forEach(petal => {
      tl.to(petal.rotation, {
        x:        layer.openX,
        duration: 0.32,
        ease:     'power2.inOut',
      }, startAt);
    });
  });

  /* 2 — CAMERA: side view → overhead bird's-eye */
  tl.to(camProxy, {
    x: 0, y: 26, z: 0.8,
    duration: 0.55,
    ease: 'power1.inOut',
    onUpdate() {
      camera.position.set(camProxy.x, camProxy.y, camProxy.z);
      camera.lookAt(lookTarget);
    },
  }, 0.22);

  /* 3 — ENGULF: lotus grows to fill entire screen */
  tl.to(lotusGroup.scale, {
    x: 10, y: 10, z: 10,
    duration: 0.48,
    ease: 'power3.in',
  }, 0.52);

  /* 4 — INTRO: fade in "Hi, I'm Neha." */
  tl.to('#intro-card', {
    opacity: 1,
    y:       0,
    duration: 0.24,
    ease:    'power2.out',
  }, 0.84);

  /* ──────────────────────────────────────────
     RENDER LOOP
  ────────────────────────────────────────── */
  const clock = new THREE.Clock();
  let scrollProgress = 0;

  ScrollTrigger.addEventListener('refresh', () => {});

  /* Grab live scroll progress each frame */
  function getScrollProgress() {
    const spacer = document.getElementById('scroll-spacer');
    if (!spacer) return 0;
    const scrollTop = window.scrollY;
    const maxScroll = spacer.offsetHeight;
    return Math.min(scrollTop / maxScroll, 1);
  }

  function tick() {
    requestAnimationFrame(tick);
    const t = clock.getElapsedTime();
    gTime = t;
    wUniforms.uTime.value = t;

    scrollProgress = getScrollProgress();

    /* Gentle lotus idle float — only before bloom */
    if (scrollProgress < 0.45) {
      const amp = 1 - scrollProgress * 2.2;
      lotusGroup.position.y = Math.sin(t * 0.75) * 0.05 * amp;
      lotusGroup.rotation.y = Math.sin(t * 0.38) * 0.012 * amp;
    }

    /* Small lotuses bob */
    smallLotuses.forEach((g, i) => {
      g.position.y = Math.sin(t * 0.55 + i * 1.3) * 0.042 + 0.02;
      g.rotation.y = Math.sin(t * 0.28 + i * 0.9) * 0.06;
    });

    /* Purple point light pulses gently */
    purplePoint.intensity = 1.8 + Math.sin(t * 1.2) * 0.4;

    renderer.render(scene, camera);
  }
  tick();

  /* ──────────────────────────────────────────
     RESIZE
  ────────────────────────────────────────── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    ScrollTrigger.refresh();
  });

  /* ──────────────────────────────────────────
     AMBIENT STARTUP RIPPLES
  ────────────────────────────────────────── */
  setTimeout(() => addRipple(-2.5,  1.5, 0.32), 500);
